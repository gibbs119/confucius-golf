<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Confucius Golf Post Maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Playfair+Display:ital,wght@0,600;1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#1E2A4A; --gold:#C9A24B; --cream:#F4ECD8; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; background:#141c30; color:var(--cream); font-family:'Oswald',system-ui,sans-serif; }
  .wrap{ max-width:560px; margin:0 auto; padding:18px 16px 60px; }
  h1{ font-weight:700; letter-spacing:2px; font-size:20px; text-align:center; color:var(--gold); margin:6px 0 2px; text-transform:uppercase; }
  .sub{ text-align:center; font-size:12px; letter-spacing:1px; color:#8ea0c4; margin-bottom:16px; text-transform:uppercase; }
  label{ display:block; font-size:12px; letter-spacing:1px; color:#8ea0c4; text-transform:uppercase; margin:14px 2px 8px; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ font-family:'Oswald'; font-weight:600; letter-spacing:.5px; text-transform:uppercase; font-size:13px; padding:10px 14px; border-radius:999px; border:1px solid #33436b; background:#0f1626; color:var(--cream); cursor:pointer; }
  .chip.active{ background:var(--gold); color:#20160a; border-color:var(--gold); }
  .another{ width:100%; margin-top:12px; font-family:'Oswald'; font-weight:700; letter-spacing:1px; text-transform:uppercase; font-size:14px; padding:14px; border-radius:12px; border:none; background:var(--gold); color:#20160a; cursor:pointer; }
  textarea{ width:100%; min-height:92px; resize:vertical; border-radius:12px; border:1px solid #33436b; background:#0f1626; color:var(--cream); padding:14px; font-size:17px; line-height:1.4; font-family:'Playfair Display',serif; font-style:italic; }
  textarea:focus{ outline:none; border-color:var(--gold); }
  .hint{ font-size:11px; color:#6b7ba0; margin:6px 2px 0; font-family:system-ui; }
  .canvas-shell{ margin:18px 0 8px; border-radius:14px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,.45); }
  #preview{ width:100%; display:block; }
  .btns{ display:flex; gap:10px; margin-top:14px; }
  button.save, a.btn{ flex:1; text-align:center; text-decoration:none; font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:1px; text-transform:uppercase; font-size:14px; padding:15px 10px; border-radius:12px; border:none; cursor:pointer; }
  .primary{ background:var(--gold); color:#20160a; }
  .ghost{ background:transparent; color:var(--gold); border:1px solid var(--gold); }
  .savenote{ font-family:system-ui; font-size:12px; color:#8ea0c4; text-align:center; margin-top:14px; line-height:1.5; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Confucius Golf</h1>
  <div class="sub">Post Maker</div>

  <label>Pick a vibe</label>
  <div class="chips" id="chips"></div>
  <button class="another" id="another">&#127922; Give me one</button>

  <label for="q">Confucius say&hellip;</label>
  <textarea id="q" placeholder="Tap a vibe above, or type your own&hellip;"></textarea>
  <div class="hint">The &ldquo;CONFUCIUS SAY&rdquo; header, badge &amp; handle are added automatically. Edit any line before saving.</div>

  <div class="canvas-shell"><img id="preview" alt="preview"></div>
  <canvas id="c" width="1080" height="1080" style="display:none"></canvas>

  <div class="btns">
    <button class="save primary" id="save">Save Image</button>
    <a class="btn ghost" id="dl" download="confucius-golf.png">Download</a>
  </div>
  <div class="savenote">On iPhone: tap <b>Save Image</b>, then long-press the picture &rarr; <b>Add to Photos</b>.</div>
</div>

<script>
const CATS = {"Funny": ["The provisional ball is always the best shot one hits all day. This is law of the universe, not coincidence.", "One does not lose the ball. The ball simply chooses a new life in the trees.", "New driver fix the slice for exactly four holes. This is the warranty.", "Practice swing is flawless every time. The ball is the only variable.", "The pine tree is ninety percent air, and one hundred percent in the way.", "One who yells \"fore\" three seconds late has already found the windshield.", "Golf cart with no beer is simply a slow car.", "The breakfast ball is not cheating. It is mercy.", "One who buys the large bucket still slices the small one.", "The glove is worn on one hand so the other may hold the beer.", "One who three-putts from six feet must reconsider many things.", "One does not choose the shank. The shank chooses the worst possible moment.", "The ball washer has saved many balls that were about to be lost forever.", "The driving range is where one's confidence goes to lie to them."], "Relatable": ["Friday night plans of the wise: none. Saturday has a 7:10 tee time.", "One does not sleep before the early tee time. One waits for the alarm.", "The range groove and the first tee have never once met.", "One good shot per round is enough to bring one back. This is the trap.", "The last hole is always the reason one returns.", "One who says \"I am done after this\" has said it for twenty years.", "The clubs are cleaned only after the rounds one plays worst.", "Every golfer is one lesson from quitting or greatness, and never knows which.", "One who plays well on the range peaks at the wrong time.", "The back nine is where the front nine's promises go to die.", "One always has time for nine more, never for the chores at home.", "The first-tee jitters do not care how many times one has done this.", "One swears off the game every Sunday and books a tee time every Monday."], "Motivational": ["The only shot that matters is the next one.", "One does not control the bounce. One controls the next swing.", "Par is not perfection. Par is patience rewarded.", "The round is not lost on the bad hole. It is lost on the hole after.", "One who forgives the last shot frees the next one.", "Every scratch golfer was once a beginner who refused to quit.", "The course does not care about yesterday. Play the ball where it lies.", "Pressure is a privilege. It means one still has something to play for.", "One masters not the course, but oneself upon it.", "The good walk is the reward. The score is only the story.", "Commit to the shot and the water disappears.", "Confidence is not the absence of the miss. It is the will to swing anyway.", "Patience makes the golfer long before the low round makes the name."], "Topical": ["LIV or PGA, the shank respects no tour.", "One may own the newest driver on the internet and still tee off from the trees.", "The influencer swings for the camera. The golfer swings for the group text.", "The rangefinder gives the yardage. It cannot give the nerves.", "The simulator teaches one to love winter and fear the real first tee.", "New season, same slice.", "One who watches the majors all weekend still tops the drive on Monday.", "The garage hitting mat has humbled many a January hero.", "Everyone is a purist until the scramble buys the first round.", "The group chat remembers the shank longer than it remembers the birdie."], "Purist": ["Walk the course and it will speak. Ride it and one hears only the engine.", "The persimmon knew a truth the titanium has forgotten.", "Links golf is not a style. It is a confession.", "One does not conquer an old course. One is granted passage.", "The purest sound in golf is a shot struck flush, heard by no one.", "Match play reveals the character that stroke play only counts.", "Ready golf honors the group. Slow golf honors no one.", "Repair the pitch mark you did not make. This is the game.", "A round at dawn, walking, alone, is the game as it was meant to be.", "The rules are not the enemy. They are the reason it counts.", "One tends the flag, replaces the divot, and leaves the course better than found.", "Respect the walk, respect the pace, respect the game."], "Witty": ["Golf is a five-inch game played between the ears.", "Handicap is the number one lies about more than one's salary.", "One who points at the wind should first inspect the grip.", "The sandbagger keeps two cards: one for the club, one for the conscience.", "The yips live not in the hands, but in the mind that watches them.", "One plays for pride until the press. Then one plays for blood.", "The foursome ahead moves at the speed of regret.", "Golf gives one everything except the shot one just described at the bar.", "The gimme is a gift one gives in order to receive one back.", "One does not beat the course. One negotiates a truce.", "A good miss is a decision. A bad miss is a lesson. Either way, one pays.", "The scorecard is a diary one cannot lie to."], "Punny": ["One who loses balls in the woods has far too many iron-ies.", "Fore-giveness is the golfer's highest virtue.", "A slice of humble pie is served fresh on every first tee.", "One who drives well is simply a-head of the field.", "The short game is a chip off the old block.", "One who wins by a putt wins by a hole lot of nerve.", "Golf without water hazards would be a shore thing.", "The wise golfer takes life one stroke, and one beer, at a time.", "One who fears the bunker is only sand-bagging the truth.", "The best grip on life is the interlock."], "Savage": ["One who asks \"who is away?\" after the third putt already knows.", "\"Good roll\" is what one says while the ball is still moving.", "The friend who improves his lie also improves his story.", "One who gives himself that putt would give himself the trophy.", "Nice swing. Shame about the ball.", "The mulligan count rises with the size of the wager.", "One who narrates his good shots forgets to count the rest.", "That was the handicap talking, not the swing.", "One who blames the greens putts the same on all of them.", "The longest thing one drove all day was the excuse.", "One who wins closest-to-the-pin will never let the group forget it.", "Your provisional was better than your first ball and most of your decisions."], "Wholesome": ["The score is forgotten by the parking lot. The round is remembered for years.", "Some play for the birdie. The wise play for the group text after.", "The best foursome laughs through the worst nine.", "One forgets every shot but remembers who was there.", "The turn is not for the beer. It is for the friends who order it.", "Golf is the long walk that keeps old friends close.", "The parent who teaches the grip passes down more than a swing.", "Rain shortened the round, never the round of drinks."]};
const ORDER = ["Funny", "Relatable", "Motivational", "Topical", "Purist", "Witty", "Punny", "Savage", "Wholesome"];
let selected = ORDER[0];
const lastByCat = {};

const chipsEl=document.getElementById('chips');
ORDER.forEach(cat=>{
  const b=document.createElement('button');
  b.className='chip'+(cat===selected?' active':''); b.textContent=cat;
  b.addEventListener('click',()=>{ selected=cat;
    document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active', c.textContent===cat));
    giveOne(); });
  chipsEl.appendChild(b);
});
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function giveOne(){
  const pool=CATS[selected]||[]; if(!pool.length) return;
  let out=pick(pool),g=0; while(out===lastByCat[selected] && pool.length>1 && g++<8) out=pick(pool);
  lastByCat[selected]=out;
  document.getElementById('q').value=out; render();
}
document.getElementById('another').addEventListener('click',giveOne);

function roundRect(x,y,w,h,r){ if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);return;}
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function trackedWidth(t,tr){let w=0;for(const c of t){w+=ctx.measureText(c).width+tr;}return w-tr;}
function drawTracked(t,cx,y,tr,fill){ctx.fillStyle=fill;ctx.textBaseline='top';ctx.textAlign='left';
  let x=cx-trackedWidth(t,tr)/2;for(const c of t){ctx.fillText(c,x,y);x+=ctx.measureText(c).width+tr;}}
function wrapText(text,maxW){const words=text.trim().split(/\s+/),lines=[];let cur='';
  for(const w of words){const t=cur?cur+' '+w:w; if(ctx.measureText(t).width<=maxW)cur=t; else{if(cur)lines.push(cur);cur=w;}}
  if(cur)lines.push(cur);return lines;}
function render(){
  const quote=(document.getElementById('q').value||'').trim();
  ctx.fillStyle=NAVY;ctx.fillRect(0,0,S,S);
  ctx.strokeStyle=GOLD;ctx.lineWidth=4;roundRect(40,40,1000,1000,44);ctx.stroke();
  ctx.lineWidth=2;roundRect(58,58,964,964,34);ctx.stroke();
  const cx=S/2,diam=208,by=92; ctx.drawImage(badge,cx-diam/2,by,diam,diam);
  const eyTop=by+diam+40; ctx.font='700 44px "Oswald"'; drawTracked('CONFUCIUS SAY',cx,eyTop,14,GOLD);
  const ruleY=eyTop+66; ctx.strokeStyle=GOLD;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(cx-46,ruleY);ctx.lineTo(cx+46,ruleY);ctx.stroke();
  const maxW=S-250,sizes=[76,70,64,60,58,54,50,46]; let qsize=46,lines=[],lineH=0,blockH=0;
  for(const s of sizes){ctx.font='italic 400 '+s+'px "Playfair Display"';
    const ls=wrapText(quote,maxW),lh=Math.round(s*1.28),bh=lh*ls.length;
    qsize=s;lines=ls;lineH=lh;blockH=bh; if(ls.length<=6&&bh<=480)break;}
  ctx.font='italic 400 '+qsize+'px "Playfair Display"';
  const zoneTop=ruleY+50,zoneBot=S-175,startY=zoneTop+((zoneBot-zoneTop)-blockH)/2;
  ctx.fillStyle=CREAM;ctx.textBaseline='top';ctx.textAlign='left';
  lines.forEach((ln,i)=>{const w=ctx.measureText(ln).width;ctx.fillText(ln,cx-w/2,startY+i*lineH);});
  const firstW=ctx.measureText(lines[0]||'').width,lastW=ctx.measureText(lines[lines.length-1]||'').width;
  ctx.font='italic 700 '+Math.round(qsize*1.7)+'px "Playfair Display"';ctx.fillStyle=GOLD;
  const ow=ctx.measureText('\u201C').width;
  ctx.fillText('\u201C',cx-firstW/2-ow-6,startY-qsize*0.32);
  const lastTop=startY+lineH*(lines.length-1);
  ctx.fillText('\u201D',cx+lastW/2+6,lastTop-qsize*0.30);
  ctx.font='600 34px "Oswald"';const htxt='@confuciusgolf',hw=trackedWidth(htxt,2),hy=S-128;
  drawTracked(htxt,cx,hy,2,GOLD);
  ctx.strokeStyle=GOLD;ctx.lineWidth=3;const gap=18,dash=24,dy=hy+22;
  ctx.beginPath();ctx.moveTo(cx-hw/2-gap-dash,dy);ctx.lineTo(cx-hw/2-gap,dy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+hw/2+gap,dy);ctx.lineTo(cx+hw/2+gap+dash,dy);ctx.stroke();
  const url=canvas.toDataURL('image/png');preview.src=url;dl.href=url;
}
let t;document.getElementById('q').addEventListener('input',()=>{clearTimeout(t);t=setTimeout(render,120);});
document.getElementById('save').addEventListener('click',()=>{render();
  const isiOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  if(!isiOS){dl.click();}else{window.scrollTo({top:document.querySelector('.canvas-shell').offsetTop-10,behavior:'smooth'});}});

  document.fonts.load('700 44px "Oswald"'),document.fonts.load('600 34px "Oswald"'),
  document.fonts.load('italic 400 76px "Playfair Display"'),document.fonts.load('italic 700 130px "Playfair Display"')
